<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360 Webpage</title>
    <link rel="stylesheet" type="text/css" href="assets/vr.css">
    <audio id="myAudio" src="assets/music/Fairy Fountain.mp3"></audio>
    <style>
        :root {
            --bridge-height: 51.5vh;
            --bridge-top: var(--bridge-height);
            --character-width: clamp(72px, 6vw, 112px);
            --castle-height: clamp(330px, 51vh, 540px);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #191970;
            overflow: hidden;
        }

        body {
            position: relative;
        }

        #panorama {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #sun {
            position: fixed;
            top: 1%;
            left: 18%;
            width: clamp(86px, 7vw, 140px);
            aspect-ratio: 1;
            background-color: #fdd300;
            border-radius: 50%;
            box-shadow: 0 0 24px #fdd300;
            cursor: pointer;
            z-index: 5;
        }

        #bridge {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            height: var(--bridge-height);
            background-image: url("assets/images/bridge.png");
            background-size: cover;
            background-position: center top;
            z-index: 10;
        }

        #corner-image {
            position: fixed;
            bottom: var(--bridge-top);
            left: 7vw;
            width: var(--character-width);
            height: auto;
            transform: translateY(2.8vh);
            animation: walk-right 190s linear infinite;
            z-index: 30;
        }

        #mystar-image {
            position: fixed;
            bottom: calc(var(--bridge-top) - 1vh);
            left: 7vw;
            width: clamp(72px, 6vw, 108px);
            height: auto;
            transform: rotate(180deg);
            animation: walk-right-star 190s linear infinite;
            z-index: 29;
        }

        #notes-image {
            position: fixed;
            bottom: calc(var(--bridge-top) + 6vh);
            left: 11vw;
            width: clamp(70px, 6vw, 108px);
            height: auto;
            animation: note-right 160s linear infinite;
            z-index: 35;
        }

        #tree-image {
            position: fixed;
            bottom: var(--bridge-top);
            left: 0;
            width: clamp(100px, 8vw, 150px);
            height: calc(100vh - var(--bridge-height));
            object-fit: cover;
            object-position: left bottom;
            z-index: 12;
        }

        #castle-link {
            position: fixed;
            right: clamp(70px, 10vw, 150px);
            bottom: var(--bridge-top);
            height: var(--castle-height);
            transform: translateY(3.2vh);
            z-index: 24;
        }

        #castle-image {
            display: block;
            height: 100%;
            width: auto;
            cursor: pointer;
        }

        .speech-bubble {
            position: fixed;
            right: clamp(60px, 9vw, 140px);
            bottom: calc(var(--bridge-top) + min(40vh, 410px));
            background-color: white;
            border-radius: 10px;
            padding: 14px 16px;
            min-width: 56px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            z-index: 28;
        }

        .speech-bubble::after {
            content: "";
            position: absolute;
            bottom: -20px;
            left: 40%;
            margin-left: -10px;
            border-width: 10px;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        #stars_bot-image {
            position: fixed;
            top: 0;
            left: 65%;
            width: clamp(160px, 13vw, 220px);
            height: auto;
            transform: rotate(180deg);
            z-index: 6;
        }

        #star2-image {
            position: fixed;
            top: 10%;
            right: 2%;
            width: clamp(120px, 9vw, 170px);
            height: auto;
            z-index: 6;
        }

        @keyframes walk-right {
            0% {
                left: 7vw;
            }
            50% {
                left: 74vw;
            }
            100% {
                left: 7vw;
            }
        }

        @keyframes walk-right-star {
            0% {
                left: 7vw;
            }
            50% {
                left: 74vw;
            }
            100% {
                left: 7vw;
            }
        }

        @keyframes note-right {
            0% {
                left: 14vw;
            }
            50% {
                left: 51vw;
            }
            100% {
                left: 14vw;
            }
        }

        @media (max-width: 700px) {
            :root {
                --bridge-height: 52vh;
                --character-width: clamp(86px, 17vw, 118px);
                --castle-height: clamp(330px, 51vh, 460px);
            }

            #sun {
                top: 0.5%;
                left: 7%;
                width: 128px;
            }

            #tree-image {
                width: 120px;
            }

            #castle-link {
                right: 24vw;
                bottom: var(--bridge-top);
                transform: translateY(2.4vh);
            }

            .speech-bubble {
                right: 26vw;
                bottom: calc(var(--bridge-top) + 37vh);
            }

            #stars_bot-image {
                top: 0;
                left: 68%;
                width: 160px;
            }

            #star2-image {
                top: 7%;
                right: -3%;
                width: 150px;
            }

            @keyframes walk-right {
                0% {
                    left: 28vw;
                }
                50% {
                    left: 28vw;
                }
                100% {
                    left: 28vw;
                }
            }

            @keyframes walk-right-star {
                0% {
                    left: 30vw;
                }
                50% {
                    left: 30vw;
                }
                100% {
                    left: 30vw;
                }
            }

            @keyframes note-right {
                0% {
                    left: 39vw;
                }
                50% {
                    left: 39vw;
                }
                100% {
                    left: 39vw;
                }
            }
        }
    </style>
</head>
<body>
    <div id="panorama"></div>

    <a href="index.html" aria-label="Go back home">
        <div id="sun"></div>
    </a>

    <div id="bridge"></div>

    <img id="tree-image" src="assets/images/tree.png" alt="">
    <img id="corner-image" src="assets/images/lilb.png" alt="Walking character">
    <img id="notes-image" src="assets/images/notes.png" alt="">
    <img id="stars_bot-image" src="assets/images/star2.png" alt="">
    <img id="star2-image" src="assets/images/star2.png" alt="">
    <img id="mystar-image" src="assets/images/star2.png" alt="">

    <a id="castle-link" href="castle.html" aria-label="Open castle page">
        <img id="castle-image" src="assets/images/castle.png" alt="castle">
    </a>
    <div class="speech-bubble">**</div>

    <script src="assets/vr.js"></script>
</body>
</html>
